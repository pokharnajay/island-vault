appId: com.jaypokharna.islandvault
productName: Island Vault
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.gitignore,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{dist,docs}/*'
# Version-independent name so releases/latest/download/Island-Vault-arm64.dmg
# always resolves to the newest build, no link churn on version bumps.
artifactName: Island-Vault-${arch}.${ext}
mac:
  icon: build/icon.icns
  target:
    - dmg
    - zip
  identity: null
  category: public.app-category.productivity
  extendInfo:
    LSUIElement: true
dmg:
  icon: build/icon.icns
  background: build/dmg-background.png
  iconSize: 120
  window:
    width: 600
    height: 400
  contents:
    - x: 170
      y: 210
      type: file
    - x: 430
      y: 210
      type: link
      path: /Applications
npmRebuild: true
